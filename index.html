<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noble Games</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 3rem 1.5rem 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #f8fafc;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #94a3b8;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 720px;
      padding: 1rem 1.5rem 3rem;
    }

    .game-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .game-card:hover {
      border-color: #3b82f6;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .game-card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .game-card .tag {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.2rem 0.5rem;
      border-radius: 0.25rem;
      background: #1e3a5f;
      color: #60a5fa;
    }

    .game-card p {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .game-card .play {
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #3b82f6;
    }

    .game-card:hover .play { color: #60a5fa; }

    footer {
      margin-top: auto;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <header>
    <h1>Noble Games</h1>
    <p>Board games you can play with friends, right in the browser.</p>
  </header>

  <div class="games">
    <a class="game-card" href="https://the-golden-ages.noblegames.app">
      <h2>The Golden Ages</h2>
      <span class="tag">Strategy</span>
      <p>Lead your civilization through four eras of exploration, building, and conquest. Develop technologies, construct wonders, and outmaneuver your rivals.</p>
      <span class="play">Play now &rarr;</span>
    </a>
  </div>

  <footer>&copy; 2026 Noble Games</footer>
</body>
</html>
